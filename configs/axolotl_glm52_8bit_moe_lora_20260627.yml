# GLM-5.2 Fable-style 8-bit MoE LoRA via Axolotl.
# This uses Axolotl's MoE expert quantization instead of plain BitsAndBytes,
# because GLM MoE expert weights are fused/raw Parameters in Transformers v5.

base_model: zai-org/GLM-5.2
trust_remote_code: true
strict: false

load_in_8bit: true
quantize_moe_experts: true
adapter: lora

datasets:
  - path: /home/work/.projects/LLM-OS-Models/Terminal/fable_distillation/datasets/official_agentic_sft_mix_20260627.axolotl_chatml.jsonl
    type: completion
    field: text

dataset_prepared_path: /home/work/.projects/LLM-OS-Models/Terminal/fable_distillation/.cache/axolotl/glm52_8bit_moe_lora_20260627_prepared
output_dir: /home/work/.data/harness1/models/GLM-5.2__Fable-OfficialAgentic-Axolotl-8bit-MoE-LoRA-20260627

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true
val_set_size: 0.0
dataset_num_proc: 8

lora_r: 16
lora_alpha: 32
lora_dropout: 0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
lora_target_parameters:
  - mlp.experts.gate_up_proj
  - mlp.experts.down_proj

micro_batch_size: 1
gradient_accumulation_steps: 8
max_steps: 200
save_steps: 25
logging_steps: 1
learning_rate: 8e-6
lr_scheduler: cosine
warmup_steps: 10
weight_decay: 0.0

bf16: true
tf32: true
gradient_checkpointing: true
flash_attention: false
attn_implementation: sdpa

optimizer: adamw_bnb_8bit

fsdp:
  - auto_wrap
  - full_shard
fsdp_config:
  fsdp_version: 2
  fsdp_offload_params: false
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: GlmMoeDsaDecoderLayer
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_reshard_after_forward: true
  fsdp_activation_checkpointing: true

special_tokens:
  pad_token: <|endoftext|>

auto_resume_from_checkpoints: true
saves_total_limit: 4
save_safetensors: true
